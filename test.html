<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .auto_mask {
    animation: hide 3s forwards;
}

@keyframes hide {
    0% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; display: none; }
}
    </style>
</head>
<body>
    <div class="auto_mask">Message envoyé</div>
</body>
</html>
